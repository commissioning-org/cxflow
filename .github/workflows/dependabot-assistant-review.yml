name: Dependabot review (assistant)

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # SECURITY: checkout base so local actions come from trusted code.
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch PR head (diff only)
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin ${{ github.event.pull_request.head.sha }}

      - name: Check secrets availability
        id: check-secrets
        run: |
          if [[ -n "$ASSISTANT_API_KEY" && -n "$ASSISTANT_BASE_URL" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          ASSISTANT_API_KEY: ${{ secrets.ASSISTANT_API_KEY }}
          ASSISTANT_BASE_URL: ${{ secrets.ASSISTANT_BASE_URL }}

      - name: Generate assistant review
        if: steps.check-secrets.outputs.available == 'true'
        uses: ./.github/actions/assistant-dependabot-review
        with:
          assistant_api_key: ${{ secrets.ASSISTANT_API_KEY }}
          assistant_base_url: ${{ secrets.ASSISTANT_BASE_URL }}
          assistant_model: ${{ secrets.ASSISTANT_MODEL }}
          pr_number: ${{ github.event.pull_request.number }}
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.event.pull_request.head.sha }}

      - name: Comment on PR
        if: steps.check-secrets.outputs.available == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('review_comment.md')) {
              core.info('review_comment.md missing; nothing to comment.');
              return;
            }
            const body = fs.readFileSync('review_comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Skip notice (secrets missing)
        if: steps.check-secrets.outputs.available == 'false'
        run: |
          echo "ASSISTANT_API_KEY and/or ASSISTANT_BASE_URL secrets are not configured; skipping assistant review."
