name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            image: ${{ github.repository }}-app
            context: .
            file: .docker/php/Dockerfile
          - name: ml
            image: ${{ github.repository }}-ml
            context: ./ml
            file: ./ml/Dockerfile

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and (optionally) push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write build info
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            echo "name=${{ matrix.name }}";
            echo "image=${{ env.REGISTRY }}/${{ matrix.image }}";
            echo "ref=${GITHUB_REF}";
            echo "sha=${GITHUB_SHA}";
            echo "tags=${{ steps.meta.outputs.tags }}";
            echo "digest=${{ steps.build.outputs.digest }}";
          } > "artifacts/${{ matrix.name }}-image.txt"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: docker-${{ matrix.name }}-image
          path: artifacts/${{ matrix.name }}-image.txt
          retention-days: 14

      - name: Validate docker compose config
        run: docker compose config >/dev/null
