name: CX ingestion (scheduled)

on:
  workflow_dispatch:
  schedule:
    # Daily at 04:05 UTC
    - cron: "5 4 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: cx-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: none

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ingestion GET request
        env:
          CX_INGESTION_URI: ${{ secrets.CX_INGESTION_URI }}
        run: |
          set -euo pipefail
          if [ -z "${CX_INGESTION_URI:-}" ]; then
            echo "Missing secret CX_INGESTION_URI; skipping."
            exit 0
          fi

          mkdir -p ingestion/runs

          # Fully automated retry/backoff loop.
          # The URL contains a signature; do not echo it.
          attempts=5
          delay=5
          ok=0
          last_out=""

          for i in $(seq 1 "$attempts"); do
            echo "Attempt $i/$attempts"

            set +e
            if [ -f "ingestion/cx_orchestrate.php" ]; then
              out=$(CX_INGESTION_OUT_DIR="ingestion/runs" php ingestion/cx_orchestrate.php "$CX_INGESTION_URI")
            else
              out=$(CX_INGESTION_OUT_DIR="ingestion/runs" php ingestion/php_cx_request.php "$CX_INGESTION_URI")
            fi
            rc=$?
            set -e

            last_out="$out"
            printf "%s\n" "$out" > ingestion/last_run_output.json

            # Determine success:
            # - rc==0 and stdout JSON ok==true
            parsed_ok=$(python3 -c 'import json; d=json.load(open("ingestion/last_run_output.json")); print("1" if d.get("ok") is True else "0")' 2>/dev/null || echo "0")
            if [ "$rc" -eq 0 ] && [ "$parsed_ok" = "1" ]; then
              ok=1
              break
            fi

            echo "Run failed (exit=$rc). Sleeping ${delay}s before retry..."
            sleep "$delay"
            delay=$((delay * 2))
            if [ "$delay" -gt 60 ]; then delay=60; fi
          done

          # Redact any signed parameters that might appear in output (defense-in-depth).
          python3 -c 'import re,sys; t=open("ingestion/last_run_output.json","r").read(); t=re.sub(r"sig=[^&\"\\s]+","sig=<redacted>",t); t=re.sub(r"sv=[^&\"\\s]+","sv=<redacted>",t); t=re.sub(r"sp=[^&\"\\s]+","sp=<redacted>",t); print(t)' \
            > ingestion/last_run_output.redacted.json

          # Surface key metadata for later steps.
          python3 -c 'import json; d=json.load(open("ingestion/last_run_output.json")); print(f"run_id={d.get(\"run_id\",\"\")}"); print(f"run_dir={d.get(\"run_dir\",\"\")}"); print(f"ok={str(d.get(\"ok\",False)).lower()}"); print(f"http_code={d.get(\"response\",{}).get(\"http_code\",\"\")}")' >> "$GITHUB_OUTPUT"

          # Do not fail the job immediately; we handle notification + artifacts below.
          if [ "$ok" -ne 1 ]; then
            echo "Ingestion failed after retries."
          fi
        id: ingest

      - name: Upload ingestion artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cx-ingestion-${{ steps.ingest.outputs.run_id || github.run_id }}
          path: |
            ingestion/last_run_output.redacted.json
            ingestion/last_run_output.json
            ${{ steps.ingest.outputs.run_dir }}/manifest.json
            ${{ steps.ingest.outputs.run_dir }}/event.json
            ${{ steps.ingest.outputs.run_dir }}/response.headers.txt
            ${{ steps.ingest.outputs.run_dir }}/response.headers.json
            ${{ steps.ingest.outputs.run_dir }}/response.body
            ${{ steps.ingest.outputs.run_dir }}/response.decoded.body
            ${{ steps.ingest.outputs.run_dir }}/response.json
            ${{ steps.ingest.outputs.run_dir }}/rows.ndjson
            ${{ steps.ingest.outputs.run_dir }}/rows.csv
            ${{ steps.ingest.outputs.run_dir }}/files
            ${{ steps.ingest.outputs.run_dir }}/webhook.result.json
            ${{ steps.ingest.outputs.run_dir }}/route.*.result.json
            ${{ steps.ingest.outputs.run_dir }}/supabase.upload.result.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Add workflow summary
        if: always()
        run: |
          {
            echo "## CX ingestion summary";
            echo "";
            echo "- ok: ${{ steps.ingest.outputs.ok }}";
            echo "- http_code: ${{ steps.ingest.outputs.http_code }}";
            echo "- run_id: ${{ steps.ingest.outputs.run_id }}";
            echo "- run_dir: ${{ steps.ingest.outputs.run_dir }}";
            echo "";
            echo "Artifacts are uploaded for this run.";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Close previous failure issues (on success)
        if: steps.ingest.outputs.ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const titlePrefix = 'CX ingestion failed (';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ingestion,failed',
              per_page: 100,
            });

            const toClose = issues.filter(i => typeof i.title === 'string' && i.title.startsWith(titlePrefix));
            for (const issue of toClose) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Ingestion succeeded in workflow run ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}. Closing automatically.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Open issue on persistent failure
        if: steps.ingest.outputs.ok != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runId = '${{ steps.ingest.outputs.run_id }}' || String(context.runId);
            const httpCode = '${{ steps.ingest.outputs.http_code }}' || 'unknown';
            const redacted = fs.existsSync('ingestion/last_run_output.redacted.json')
              ? fs.readFileSync('ingestion/last_run_output.redacted.json', 'utf8')
              : '';

            const title = `CX ingestion failed (run ${runId})`;
            const body = [
              `Automated ingestion failed after retries.`,
              ``,
              `- workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- run_id: ${runId}`,
              `- http_code: ${httpCode}`,
              ``,
              `Redacted output:`,
              '```json',
              redacted.slice(0, 60000),
              '```'
            ].join('\n');

            // Avoid spamming duplicate issues: search recent open issues with same title.
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50
            });
            const exists = issues.some(i => i.title === title);
            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ingestion', 'automation', 'failed']
              });
            }

      - name: Fail workflow on persistent failure
        if: steps.ingest.outputs.ok != 'true'
        run: |
          echo "Ingestion did not succeed after retries. Marking workflow as failed."
          exit 1
