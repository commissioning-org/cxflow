name: Dependabot auto-merge (safe)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for non-breaking updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        uses: actions/github-script@v8
        with:
          script: |
            // Enable auto-merge (squash) for patch/minor Dependabot updates.
            // CI is expected to gate the merge.
            const pr = context.payload.pull_request;

            // Add a label to make intent explicit.
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['dependencies', 'automerge']
            }).catch(() => {});

            // Attempt to enable auto-merge. This requires auto-merge to be enabled in repo settings.
            const mutation = `
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: SQUASH}) {
                  pullRequest { number }
                }
              }
            `;

            await github.graphql(mutation, { pullRequestId: pr.node_id });

      - name: Skip major updates
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "Major update detected; leaving for human review."
