name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer:v2
        coverage: none

    - name: Validate composer.json and composer.lock
      working-directory: my-app
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.composer/cache/files
          my-app/vendor
        key: ${{ runner.os }}-php83-composer-${{ hashFiles('my-app/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php83-composer-

    - name: Install dependencies
      working-directory: my-app
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Composer audit (best-effort)
      working-directory: my-app
      run: |
        set -euo pipefail
        # Composer audit can exit non-zero when vulnerabilities are found.
        # Capture output for artifacts but don't fail this workflow.
        (composer audit --format=json --no-interaction > audit.json) || true

    - name: Upload composer artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: composer-audit
        path: |
          my-app/audit.json
        if-no-files-found: ignore
        retention-days: 14

    # Add a test script to composer.json, for instance: "test": "vendor/bin/phpunit"
    # Docs: https://getcomposer.org/doc/articles/scripts.md

    # - name: Run test suite
    #   run: composer run-script test
