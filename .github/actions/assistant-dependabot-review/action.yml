name: "Assistant Dependabot Review"
description: "Generate a dependency-update summary using an internal review endpoint (requires ASSISTANT_API_KEY)."
inputs:
  assistant_api_key:
    description: "API key for the internal assistant endpoint"
    required: true
  assistant_base_url:
    description: "Base URL for the assistant endpoint (OpenAI-compatible)"
    required: true
  assistant_model:
    description: "Model identifier (kept as secret/config)"
    required: false
    default: ""
  pr_number:
    description: "Pull request number"
    required: true
  base_sha:
    description: "Base commit SHA"
    required: true
  head_sha:
    description: "Head commit SHA"
    required: true
runs:
  using: "composite"
  steps:
    - name: Create diff summary JSON
      shell: bash
      run: |
        set -euo pipefail
        base_sha="${{ inputs.base_sha }}"
        head_sha="${{ inputs.head_sha }}"

        # Keep payload small: names + a limited diff.
        changed_files=$(git diff --name-only "$base_sha" "$head_sha" | head -n 200)
        patch=$(git diff --unified=3 "$base_sha" "$head_sha" | head -c 45000)

        cat > review_input.json <<JSON
        {
          "pr": {"number": ${{ inputs.pr_number }}, "base": "$base_sha", "head": "$head_sha"},
          "changed_files": $(python - <<'PY'
import json,sys
files=sys.stdin.read().splitlines()
print(json.dumps(files))
PY
<<<"$changed_files"),
          "diff": $(python - <<'PY'
import json,sys
print(json.dumps(sys.stdin.read()))
PY
<<<"$patch")
        }
JSON

    - name: Request assistant review
      shell: bash
      env:
        ASSISTANT_API_KEY: ${{ inputs.assistant_api_key }}
        ASSISTANT_BASE_URL: ${{ inputs.assistant_base_url }}
        ASSISTANT_MODEL: ${{ inputs.assistant_model }}
      run: |
        set -euo pipefail

        url="$ASSISTANT_BASE_URL"
        url="${url%/}"

        if [ -z "${ASSISTANT_MODEL:-}" ]; then
          cat > review_comment.md <<'MD'
### Dependency update review (automated)

Assistant review is configured but `ASSISTANT_MODEL` is missing.

Add a repository secret named `ASSISTANT_MODEL` (model identifier for your OpenAI-compatible endpoint) to enable automated reviews.
MD
          exit 0
        fi

        # OpenAI-compatible chat completions.
        # NOTE: Keep prompt free of any provider/model naming.
        prompt=$(python - <<'PY'
import json
with open('review_input.json','r') as f:
  data=json.load(f)
print(
  "You are reviewing a dependency update PR.\n"
  "Return JSON with keys: summary, risks, breaking_changes, recommended_checks.\n\n"
  "Input:\n" + json.dumps(data, indent=2)
)
PY
)

        # Export prompt via env to avoid shell escaping issues.
        export PROMPT="$prompt"

        # Render request body.
        body=$(python - <<'PY'
import json,os
prompt=os.environ['PROMPT']
model=os.environ.get('ASSISTANT_MODEL','')
print(json.dumps({
  "model": model,
  "messages": [
    {"role": "system", "content": "Return ONLY valid JSON."},
    {"role": "user", "content": prompt}
  ],
  "temperature": 0.2
}))
PY
)

        # POST
        resp=$(curl -sS --fail -X POST "$url/v1/chat/completions" \
          -H "Authorization: Bearer $ASSISTANT_API_KEY" \
          -H "Content-Type: application/json" \
          --data "$body")

        # Extract JSON content (best-effort).
        python - <<'PY'
import json,sys
resp=json.loads(sys.stdin.read())
content=resp.get('choices',[{}])[0].get('message',{}).get('content','')
print(content)
PY
<<<"$resp" > review_output.json

    - name: Format markdown comment
      shell: bash
      run: |
        set -euo pipefail
        python - <<'PY'
import json
p='review_output.json'
with open(p,'r') as f:
  raw=f.read().strip()
try:
  data=json.loads(raw)
except Exception:
  data={"summary": raw}

summary=data.get('summary','')
risks=data.get('risks',[])
bc=data.get('breaking_changes',[])
checks=data.get('recommended_checks',[])

def bullets(x):
  if not x:
    return "- (none)"
  if isinstance(x,str):
    return "- " + x
  return "\n".join(["- " + str(i) for i in x])

md = """### Dependency update review (automated)\n\n"""
md += f"**Summary**\n\n{summary}\n\n"
md += "**Risks**\n\n" + bullets(risks) + "\n\n"
md += "**Breaking changes**\n\n" + bullets(bc) + "\n\n"
md += "**Recommended checks**\n\n" + bullets(checks) + "\n"

with open('review_comment.md','w') as f:
  f.write(md)
PY
