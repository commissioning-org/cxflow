name: "Assistant Dependabot Review"
description: "Generate a dependency-update summary using an internal review endpoint (requires ASSISTANT_API_KEY)."

inputs:
  assistant_api_key:
    description: "API key for the internal assistant endpoint"
    required: true
  assistant_base_url:
    description: "Base URL for the assistant endpoint (OpenAI-compatible)"
    required: true
  assistant_model:
    description: "Model identifier (kept as secret/config)"
    required: false
    default: ""
  pr_number:
    description: "Pull request number"
    required: true
  base_sha:
    description: "Base commit SHA"
    required: true
  head_sha:
    description: "Head commit SHA"
    required: true

runs:
  using: "composite"
  steps:
    - name: Create diff summary JSON
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr_number }}
        BASE_SHA: ${{ inputs.base_sha }}
        HEAD_SHA: ${{ inputs.head_sha }}
      run: |
        set -euo pipefail

        python - <<'PY'
        import json
        import os
        import subprocess

        base = os.environ["BASE_SHA"]
        head = os.environ["HEAD_SHA"]
        pr_number = int(os.environ["PR_NUMBER"])

        files_out = subprocess.check_output([
            "git", "diff", "--name-only", base, head
        ], text=True)
        changed_files = [line for line in files_out.splitlines() if line.strip()][:200]

        diff_out = subprocess.check_output([
            "git", "diff", "--unified=3", base, head
        ], text=True, errors="replace")
        patch = diff_out[:45000]

        payload = {
            "pr": {"number": pr_number, "base": base, "head": head},
            "changed_files": changed_files,
            "diff": patch,
        }

        with open("review_input.json", "w", encoding="utf-8") as f:
            json.dump(payload, f)
        PY

    - name: Request assistant review
      shell: bash
      env:
        ASSISTANT_API_KEY: ${{ inputs.assistant_api_key }}
        ASSISTANT_BASE_URL: ${{ inputs.assistant_base_url }}
        ASSISTANT_MODEL: ${{ inputs.assistant_model }}
      run: |
        set -euo pipefail

        url="${ASSISTANT_BASE_URL%/}"

        if [ -z "${ASSISTANT_MODEL:-}" ]; then
          python - <<'PY'
          content = """### Dependency update review (automated)

Assistant review is configured but `ASSISTANT_MODEL` is missing.

Add a repository secret named `ASSISTANT_MODEL` (model identifier for your OpenAI-compatible endpoint) to enable automated reviews.
"""
          with open('review_comment.md', 'w', encoding='utf-8') as f:
              f.write(content)
          PY
          exit 0
        fi

        python - <<'PY'
        import json

        with open('review_input.json', 'r', encoding='utf-8') as f:
            data = json.load(f)

        prompt = (
            "You are reviewing a dependency update PR.\n"
            "Return JSON with keys: summary, risks, breaking_changes, recommended_checks.\n\n"
            "Input:\n" + json.dumps(data, indent=2)
        )

        body = {
            "model": "${ASSISTANT_MODEL}",
            "messages": [
                {"role": "system", "content": "Return ONLY valid JSON."},
                {"role": "user", "content": prompt},
            ],
            "temperature": 0.2,
        }

        with open('request.json', 'w', encoding='utf-8') as f:
            json.dump(body, f)
        PY

        curl -sS --fail -X POST "$url/v1/chat/completions" \
          -H "Authorization: Bearer $ASSISTANT_API_KEY" \
          -H "Content-Type: application/json" \
          --data @request.json > response.json

        python - <<'PY'
        import json

        with open('response.json', 'r', encoding='utf-8') as f:
            resp = json.load(f)

        content = resp.get('choices', [{}])[0].get('message', {}).get('content', '')
        with open('review_output.json', 'w', encoding='utf-8') as f:
            f.write(content)
        PY

    - name: Format markdown comment
      shell: bash
      run: |
        set -euo pipefail

        python - <<'PY'
        import json

        p = 'review_output.json'
        with open(p, 'r', encoding='utf-8') as f:
            raw = f.read().strip()

        try:
            data = json.loads(raw) if raw else {}
        except Exception:
            data = {"summary": raw}

        summary = data.get('summary', '')
        risks = data.get('risks', [])
        bc = data.get('breaking_changes', [])
        checks = data.get('recommended_checks', [])

        def bullets(x):
            if not x:
                return "- (none)"
            if isinstance(x, str):
                return "- " + x
            return "\n".join(["- " + str(i) for i in x])

        md = "### Dependency update review (automated)\n\n"
        md += f"**Summary**\n\n{summary}\n\n"
        md += "**Risks**\n\n" + bullets(risks) + "\n\n"
        md += "**Breaking changes**\n\n" + bullets(bc) + "\n\n"
        md += "**Recommended checks**\n\n" + bullets(checks) + "\n"

        with open('review_comment.md', 'w', encoding='utf-8') as f:
            f.write(md)
        PY
