version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      actions-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
      actions-major:
        applies-to: version-updates
        update-types:
          - "major"

  # Python dependencies for the internal ML service
  - package-ecosystem: "pip"
    directory: "/ml"
    schedule:
      interval: "daily"
      time: "03:15"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(pip)"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      pip-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
      pip-major:
        applies-to: version-updates
        update-types:
          - "major"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/ml"
    schedule:
      interval: "daily"
      time: "03:30"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      docker-ml:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/.docker/php"
    schedule:
      interval: "daily"
      time: "03:45"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      docker-php:
        patterns:
          - "*"

  # Composer (PHP) dependencies for Laravel app
  - package-ecosystem: "composer"
    directory: "/my-app"
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "php"
    commit-message:
      prefix: "deps(composer)"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      composer-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
      composer-major:
        applies-to: version-updates
        update-types:
          - "major"

  # npm dependencies for Laravel app
  - package-ecosystem: "npm"
    directory: "/my-app"
    schedule:
      interval: "daily"
      time: "04:15"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps(npm)"
      include: "scope"
    open-pull-requests-limit: 10
    groups:
      npm-patch-minor:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
      npm-major:
        applies-to: version-updates
        update-types:
          - "major"
