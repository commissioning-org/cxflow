version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Python dependencies for the internal ML service
  - package-ecosystem: "pip"
    directory: "/ml"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/ml"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/.docker/php"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
