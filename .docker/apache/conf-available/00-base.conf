# Base Apache defaults for containerized Laravel development.
# Keep these safe for local dev while still being production-friendly.

# Basic hardening (doesn't break dev)
ServerTokens Prod
ServerSignature Off
TraceEnable Off

HostnameLookups Off

# Reasonable keepalive/timeouts for dev
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 2
Timeout 60

<IfModule mod_reqtimeout.c>
    # Mitigate slowloris-style request header/body trickle.
    RequestReadTimeout header=20-40,MinRate=500 body=20,MinRate=500
</IfModule>

# More informative access logs (includes request time in microseconds)
# Note: if mod_remoteip is enabled, %h will reflect the client IP.
LogFormat "%v %h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %D" vhost_combined

# Default deny for /var/www; vhosts must explicitly grant access.
<Directory /var/www/>
    Options FollowSymLinks
    AllowOverride None
    Require all denied
</Directory>
