# Reverse proxy to the internal AutoML service (FastAPI) running in the `ml` container.
#
# This lets you access the ML API via the same port as Laravel:
#   http://localhost:<APP_PORT>/ml/...
#
# Notes:
# - The upstream service listens on http://ml:8000 (Docker Compose service name).
# - We keep this under /ml/ to avoid route collisions with Laravel.

<IfModule mod_proxy.c>
    <IfModule mod_proxy_http.c>
        ProxyRequests Off
        ProxyPreserveHost On

        # Forward common headers
        RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
        RequestHeader set X-Forwarded-Port expr=%{SERVER_PORT}

        # Trailing slash matters for correct path joining
        ProxyPass        "/ml/"  "http://ml:8000/" connectiontimeout=5 timeout=120 retry=0
        ProxyPassReverse "/ml/"  "http://ml:8000/"

        # Convenience: /ml -> /ml/
        RedirectMatch 302 ^/ml$ /ml/
    </IfModule>
</IfModule>
