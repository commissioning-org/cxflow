# Security and application headers.

<IfModule mod_headers.c>
    # Safer defaults
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-Permitted-Cross-Domain-Policies "none"

    # Tighten browser feature usage (adjust as needed)
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    # If you terminate TLS in front of this container, consider enabling HSTS there.
    # (We intentionally do NOT set Strict-Transport-Security by default in dev.)

    # Hide some framework/version hints where possible
    Header unset X-Powered-By
</IfModule>
