# Lightweight caching rules suitable for dev.
# - Strong caching only for Vite build outputs (usually fingerprinted).
# - Mild caching for other static assets.

<IfModule mod_headers.c>
    <LocationMatch "^/build/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    <FilesMatch "\.(?:css|js|mjs|map|png|jpe?g|gif|webp|svg|ico|woff2?|ttf)$">
        Header set Cache-Control "public, max-age=3600"
    </FilesMatch>
</IfModule>

<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresDefault "access plus 1 hour"
    ExpiresByType text/css "access plus 1 hour"
    ExpiresByType application/javascript "access plus 1 hour"
    ExpiresByType image/svg+xml "access plus 1 hour"
    ExpiresByType font/woff2 "access plus 1 year"
</IfModule>
