# Response compression for common text-based assets.

<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE \
        text/plain text/html text/xml text/css \
        application/xml application/xhtml+xml \
        application/rss+xml application/atom+xml \
        application/json application/ld+json \
        application/javascript application/x-javascript text/javascript \
        image/svg+xml

    # Avoid compressing already-compressed formats
    SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|webp|avif|ico|zip|gz|tgz|bz2|rar|7z|woff2?)$ no-gzip
    <IfModule mod_headers.c>
        Header append Vary Accept-Encoding
    </IfModule>
</IfModule>

<IfModule mod_brotli.c>
    BrotliCompressionQuality 5
    AddOutputFilterByType BROTLI_COMPRESS \
        text/plain text/html text/xml text/css \
        application/xml application/xhtml+xml \
        application/rss+xml application/atom+xml \
        application/json application/ld+json \
        application/javascript application/x-javascript text/javascript \
        image/svg+xml
    <IfModule mod_headers.c>
        Header append Vary Accept-Encoding
    </IfModule>
</IfModule>
