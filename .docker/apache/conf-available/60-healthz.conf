# Simple health endpoint that does not depend on the Laravel app being bootstrapped.

Alias /healthz /var/www/_health/healthz.txt

<Directory "/var/www/_health">
    Options -Indexes
    AllowOverride None
    Require all granted
</Directory>

<IfModule mod_headers.c>
    <Location "/healthz">
        Header set Content-Type "text/plain; charset=utf-8"
        Header set Cache-Control "no-store"
    </Location>
</IfModule>
