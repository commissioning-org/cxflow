<VirtualHost *:80>
    ServerAdmin webmaster@localhost

    # The PHP image sets a default APACHE_DOCUMENT_ROOT, and docker-compose may override it.
    # Apache expands environment variables in config at startup.
    DocumentRoot "${APACHE_DOCUMENT_ROOT}"

    <Directory "${APACHE_DOCUMENT_ROOT}">
        # Laravel expects pretty URLs; keep .htaccess support.
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    DirectoryIndex index.php index.html

    ErrorLog ${APACHE_LOG_DIR}/error.log
    # Use the custom log format from 00-base.conf (falls back to Apache defaults if removed).
    CustomLog ${APACHE_LOG_DIR}/access.log vhost_combined
</VirtualHost>
