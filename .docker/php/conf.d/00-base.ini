; Base PHP defaults for a Laravel dev container.
; These are safe defaults; you can override via env (see docker-entrypoint.sh).

; Security / noise
expose_php=0

; Error handling (dev-friendly)
error_reporting=E_ALL
log_errors=1
display_errors=1
display_startup_errors=1

; Sensible input defaults
max_input_vars=3000

; Ensure predictable timezone
date.timezone=UTC

; Avoid PATH_INFO weirdness in some PHP/Apache configurations
cgi.fix_pathinfo=0
